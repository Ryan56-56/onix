<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Success Predictor</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    #log {
      margin-top: 20px;
      padding: 10px;
      background: #111;
      color: #0f0;
      font-family: monospace;
      white-space: pre-line;
      height: 200px;
      overflow-y: auto;
      border-radius: 5px;
    }

    .input-group {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <h1>Student Success Predictor</h1>

  <h3>Enter all model inputs:</h3>

  <div id="inputs">
    <!-- All 36 input fields -->
    <div class="input-group"><label>Marital Status</label><input id="marital_status" type="number"></div>
    <div class="input-group"><label>Application Mode</label><input id="application_mode" type="number"></div>
    <div class="input-group"><label>Application Order</label><input id="application_order" type="number"></div>
    <div class="input-group"><label>Course</label><input id="course" type="number"></div>
    <div class="input-group"><label>Daytime/Evening Attendance</label><input id="daytime_evening_attendance" type="number"></div>
    <div class="input-group"><label>Previous Qualification</label><input id="previous_qualification" type="number"></div>
    <div class="input-group"><label>Previous Qualification Grade</label><input id="previous_qualification_grade" type="number"></div>
    <div class="input-group"><label>Nacionality</label><input id="nacionality" type="number"></div>
    <div class="input-group"><label>Mother's Qualification</label><input id="mother_s_qualification" type="number"></div>
    <div class="input-group"><label>Father's Qualification</label><input id="father_s_qualification" type="number"></div>
    <div class="input-group"><label>Mother's Occupation</label><input id="mother_s_occupation" type="number"></div>
    <div class="input-group"><label>Father's Occupation</label><input id="father_s_occupation" type="number"></div>
    <div class="input-group"><label>Admission Grade</label><input id="admission_grade" type="number"></div>
    <div class="input-group"><label>Displaced</label><input id="displaced" type="number"></div>
    <div class="input-group"><label>Educational Special Needs</label><input id="educational_special_needs" type="number"></div>
    <div class="input-group"><label>Debtor</label><input id="debtor" type="number"></div>
    <div class="input-group"><label>Tuition Fees Up To Date</label><input id="tuition_fees_up_to_date" type="number"></div>
    <div class="input-group"><label>Gender</label><input id="gender" type="number"></div>
    <div class="input-group"><label>Scholarship Holder</label><input id="scholarship_holder" type="number"></div>
    <div class="input-group"><label>Age at Enrollment</label><input id="age_at_enrollment" type="number"></div>
    <div class="input-group"><label>International</label><input id="international" type="number"></div>
    <div class="input-group"><label>1st Sem Credited</label><input id="curricular_units_1st_sem_credited" type="number"></div>
    <div class="input-group"><label>1st Sem Enrolled</label><input id="curricular_units_1st_sem_enrolled" type="number"></div>
    <div class="input-group"><label>1st Sem Evaluations</label><input id="curricular_units_1st_sem_evaluations" type="number"></div>
    <div class="input-group"><label>1st Sem Approved</label><input id="curricular_units_1st_sem_approved" type="number"></div>
    <div class="input-group"><label>1st Sem Grade</label><input id="curricular_units_1st_sem_grade" type="number"></div>
    <div class="input-group"><label>1st Sem Without Evaluations</label><input id="curricular_units_1st_sem_without_evaluations" type="number"></div>
    <div class="input-group"><label>2nd Sem Credited</label><input id="curricular_units_2nd_sem_credited" type="number"></div>
    <div class="input-group"><label>2nd Sem Enrolled</label><input id="curricular_units_2nd_sem_enrolled" type="number"></div>
    <div class="input-group"><label>2nd Sem Evaluations</label><input id="curricular_units_2nd_sem_evaluations" type="number"></div>
    <div class="input-group"><label>2nd Sem Approved</label><input id="curricular_units_2nd_sem_approved" type="number"></div>
    <div class="input-group"><label>2nd Sem Grade</label><input id="curricular_units_2nd_sem_grade" type="number"></div>
    <div class="input-group"><label>2nd Sem Without Evaluations</label><input id="curricular_units_2nd_sem_without_evaluations" type="number"></div>
    <div class="input-group"><label>Unemployment Rate</label><input id="unemployment_rate" type="number"></div>
    <div class="input-group"><label>Inflation Rate</label><input id="inflation_rate" type="number"></div>
    <div class="input-group"><label>GDP</label><input id="gdp" type="number"></div>
  </div>

  <button onclick="runModel()">Predict</button>

  <h3>Prediction:</h3>
<div style="display: flex; gap: 10px; align-items: center;">
    <div id="result" style="font-size: 20px; font-weight: bold;"></div>
    <div id="result_label" style="font-size: 20px; font-weight: bold; color: blue;"></div>
</div>

  <h3>Log Output:</h3>
  <div id="log"></div>

  <script src="script.js"></script>
</body>
</html>
